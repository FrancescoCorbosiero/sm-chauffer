# Deploys the site behind Caddy on a VPS.
#
# Reverse proxying is driven entirely by the `caddy.*` labels below, read by
# lucaslorentz/caddy-docker-proxy. Caddy auto-provisions HTTPS (Let's Encrypt)
# for the domain in the `caddy` label — no manual Caddyfile, no cert wrangling.
#
# Assumes a Caddy proxy is already running and attached to a shared external
# network named `caddy` (see the compose snippet in DEPLOYMENT.md). Bring the
# site up with:  docker compose up -d --build

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: chauffeur-sk-luxury-milano:latest
    container_name: chauffeur-sk-luxury-milano
    restart: unless-stopped
    # Values come from a sibling `.env` file (see .env.example). All optional:
    # without the SES_* vars the forms fall back to WhatsApp / mailto.
    environment:
      # Google Search Console verification token.
      NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION: ${NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION:-}
      # AWS SES email routing for /api/quote.
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      SES_FROM_EMAIL: ${SES_FROM_EMAIL:-}
      SES_TO_EMAIL: ${SES_TO_EMAIL:-}
    networks:
      - caddy
    expose:
      - "3000"
    labels:
      # --- Caddy reverse-proxy (the "magic") ---------------------------------
      # Caddy provisions/renews the TLS certs for each host automatically.
      # Block 0: apex domain -> Next.js standalone server on port 3000.
      caddy_0: "chauffeurskmilano.it"
      caddy_0.reverse_proxy: "{{upstreams 3000}}"
      # Block 1: www -> apex 301 redirect (no proxy loop).
      caddy_1: "www.chauffeurskmilano.it"
      caddy_1.redir: "https://chauffeurskmilano.it{uri}"

networks:
  # Shared with the Caddy proxy container. Created once on the host:
  #   docker network create caddy
  caddy:
    external: true
